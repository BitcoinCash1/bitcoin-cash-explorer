<div class="full-container">
  <div class="card-header mb-0 mb-md-4">
    <div class="d-flex d-md-block align-items-baseline">
      <span i18n="mining.utxo-set-size">Unspent Transaction Outputs</span>
      <button
        class="btn p-0 ps-2"
        style="margin: 0 0 4px 0px"
        (click)="onSaveChart()"
        aria-label="Download chart"
      >
        <fa-icon [icon]="['fas', 'download']" [fixedWidth]="true"></fa-icon>
      </button>
    </div>

    <form
      [formGroup]="radioGroupForm"
      class="formRadioGroup"
      *ngIf="utxoSetSizeObservable$ | async as stats"
    >
      <div class="btn-group" role="group" name="radioBasic">
        <ng-container *ngIf="stats.blockCount >= 144">
          <input
            type="radio"
            class="btn-check"
            id="utxosetsize-24h"
            [value]="'24h'"
            fragment="24h"
            [routerLink]="['/graphs/mining/utxo-set-size' | relativeUrl]"
            formControlName="dateSpan"
          />
          <label class="btn btn-purple btn-sm" for="utxosetsize-24h">24h</label>
        </ng-container>
        <ng-container *ngIf="stats.blockCount >= 432">
          <input
            type="radio"
            class="btn-check"
            id="utxosetsize-3d"
            [value]="'3d'"
            fragment="3d"
            [routerLink]="['/graphs/mining/utxo-set-size' | relativeUrl]"
            formControlName="dateSpan"
          />
          <label class="btn btn-purple btn-sm" for="utxosetsize-3d">3D</label>
        </ng-container>
        <ng-container *ngIf="stats.blockCount >= 1008">
          <input
            type="radio"
            class="btn-check"
            id="utxosetsize-1w"
            [value]="'1w'"
            fragment="1w"
            [routerLink]="['/graphs/mining/utxo-set-size' | relativeUrl]"
            formControlName="dateSpan"
          />
          <label class="btn btn-purple btn-sm" for="utxosetsize-1w">1W</label>
        </ng-container>
        <ng-container *ngIf="stats.blockCount >= 4320">
          <input
            type="radio"
            class="btn-check"
            id="utxosetsize-1m"
            [value]="'1m'"
            fragment="1m"
            [routerLink]="['/graphs/mining/utxo-set-size' | relativeUrl]"
            formControlName="dateSpan"
          />
          <label class="btn btn-purple btn-sm" for="utxosetsize-1m">1M</label>
        </ng-container>
        <ng-container *ngIf="stats.blockCount >= 12960">
          <input
            type="radio"
            class="btn-check"
            id="utxosetsize-3m"
            [value]="'3m'"
            fragment="3m"
            [routerLink]="['/graphs/mining/utxo-set-size' | relativeUrl]"
            formControlName="dateSpan"
          />
          <label class="btn btn-purple btn-sm" for="utxosetsize-3m">3M</label>
        </ng-container>
        <ng-container *ngIf="stats.blockCount >= 25920">
          <input
            type="radio"
            class="btn-check"
            id="utxosetsize-6m"
            [value]="'6m'"
            fragment="6m"
            [routerLink]="['/graphs/mining/utxo-set-size' | relativeUrl]"
            formControlName="dateSpan"
          />
          <label class="btn btn-purple btn-sm" for="utxosetsize-6m">6M</label>
        </ng-container>
        <ng-container *ngIf="stats.blockCount >= 52560">
          <input
            type="radio"
            class="btn-check"
            id="utxosetsize-1y"
            [value]="'1y'"
            fragment="1y"
            [routerLink]="['/graphs/mining/utxo-set-size' | relativeUrl]"
            formControlName="dateSpan"
          />
          <label class="btn btn-purple btn-sm" for="utxosetsize-1y">1Y</label>
        </ng-container>
        <ng-container *ngIf="stats.blockCount >= 105120">
          <input
            type="radio"
            class="btn-check"
            id="utxosetsize-2y"
            [value]="'2y'"
            fragment="2y"
            [routerLink]="['/graphs/mining/utxo-set-size' | relativeUrl]"
            formControlName="dateSpan"
          />
          <label class="btn btn-purple btn-sm" for="utxosetsize-2y">2Y</label>
        </ng-container>
        <ng-container *ngIf="stats.blockCount >= 157680">
          <input
            type="radio"
            class="btn-check"
            id="utxosetsize-3y"
            [value]="'3y'"
            fragment="3y"
            [routerLink]="['/graphs/mining/utxo-set-size' | relativeUrl]"
            formControlName="dateSpan"
          />
          <label class="btn btn-purple btn-sm" for="utxosetsize-3y">3Y</label>
        </ng-container>
        <ng-container *ngIf="stats.blockCount >= 210240">
          <input
            type="radio"
            class="btn-check"
            id="utxosetsize-4y"
            [value]="'4y'"
            fragment="4y"
            [routerLink]="['/graphs/mining/utxo-set-size' | relativeUrl]"
            formControlName="dateSpan"
          />
          <label class="btn btn-purple btn-sm" for="utxosetsize-4y">4Y</label>
        </ng-container>
        <input
          type="radio"
          class="btn-check"
          id="utxosetsize-all"
          [value]="'all'"
          fragment="all"
          [routerLink]="['/graphs/mining/utxo-set-size' | relativeUrl]"
          formControlName="dateSpan"
        />
        <label class="btn btn-purple btn-sm" for="utxosetsize-all">ALL</label>
      </div>
    </form>
  </div>

  <div
    class="chart"
    *browserOnly
    echarts
    [initOpts]="chartInitOptions"
    [options]="chartOptions"
    (chartInit)="onChartInit($event)"
    [style]="{ opacity: isLoading ? 0.5 : 1 }"
  ></div>
  <div
    class="text-center loadingGraphs"
    *ngIf="!stateService.isBrowser || isLoading"
  >
    <div class="spinner-border text-light"></div>
  </div>
</div>
